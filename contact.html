<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Cafe Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">☕ Cafe Shop</div>
        <nav><a href="index.html">Home</a><a href="menu.html">Menu</a><a href="about.html">About & Careers</a><a href="gallery.html">Gallery</a><a href="faqs.html">FAQs</a><a href="contact.html" class="active">Contact</a></nav>
    </header>

    <section class="section-container">
        <h2 class="section-title">Get in Touch</h2>
        <div class="grid-2-col" style="max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px;">
            <div>
                <h3>Find Us</h3>
                <p style="margin: 15px 0;">📍 Pollachi, Tamil Nadu</p>
                <p style="margin: 15px 0;">📞 +91 9876543210</p>
                <p style="margin: 15px 0;">✉️ cafeshop@hotmail.com</p>
            </div>
            <form style="display: flex; flex-direction: column; gap: 15px;">
                <input type="text" placeholder="Your Name" style="padding: 12px; border: 1px solid #ddd; border-radius: 6px;">
                <input type="email" placeholder="Your Email" style="padding: 12px; border: 1px solid #ddd; border-radius: 6px;">
                <textarea placeholder="Your Message" rows="5" style="padding: 12px; border: 1px solid #ddd; border-radius: 6px;"></textarea>
                <button type="submit" class="btn-primary" style="align-self: flex-start;">Send Message</button>
            </form>
        </div>
    </section>
</body>
</html>
